[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    powerbroker2/ELMduino@^3.4

build_flags =
    -DUSER_SETUP_LOADED=1
    ; ── ST7789 driver ─────────────────────────────
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_OFF=1
    ; ── SPI pins (HSPI) ──────────────────────────
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DUSE_HSPI_PORT=1
    -DTOUCH_CS=-1
    ; ── Backlight ─────────────────────────────────
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    ; ── SPI speed ─────────────────────────────────
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    ; ── Fonts ─────────────────────────────────────
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
